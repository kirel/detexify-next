name: Data PR Preview

on:
  pull_request:
    paths:
      - 'packages/data/source/**'

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  preview:
    name: Generate data preview
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate data
        run: npm run validate:data
      - name: Generate preview artifacts
        run: >-
          npm run data:preview-pr --
          --base origin/${{ github.base_ref }}
          --out-dir artifacts/pr-preview
          --preview-image-base-url https://raw.githubusercontent.com/${{ github.repository }}/detexify-pr-previews/pr-${{ github.event.pull_request.number }}/run-${{ github.run_id }}/
      - name: Publish inline preview images
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          PREVIEW_BRANCH: detexify-pr-previews
          PREVIEW_PATH: pr-${{ github.event.pull_request.number }}/run-${{ github.run_id }}
        run: |
          set -euo pipefail
          preview_dir="$(mktemp -d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "$PREVIEW_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PREVIEW_BRANCH"
            git worktree add "$preview_dir" "origin/$PREVIEW_BRANCH"
          else
            git worktree add --detach "$preview_dir"
            git -C "$preview_dir" switch --orphan "$PREVIEW_BRANCH"
            git -C "$preview_dir" rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p "$preview_dir/$PREVIEW_PATH"
          rsync -a --delete artifacts/pr-preview/ "$preview_dir/$PREVIEW_PATH/"
          git -C "$preview_dir" add .
          git -C "$preview_dir" commit -m "Update data preview for PR #${{ github.event.pull_request.number }}" || true
          git -C "$preview_dir" push origin "HEAD:$PREVIEW_BRANCH"
          git worktree remove "$preview_dir"
      - name: Upload preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: detexify-data-pr-preview
          path: artifacts/pr-preview
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const summary = fs.readFileSync('artifacts/pr-preview/summary.md', 'utf8')
            const marker = '<!-- detexify-data-pr-preview -->'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = `${marker}\n${summary}\n\n[Download preview artifacts](${runUrl})`
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })
            const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
